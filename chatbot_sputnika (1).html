    /* subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .wrapper {
      width: 100%;
      max-width: 540px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* gold corner ornaments */
    .wrapper::before, .wrapper::after {
      content: '';
      position: absolute;
      width: 28px; height: 28px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.7;
      z-index: 2;
      pointer-events: none;
    }
    .wrapper::before { top: -5px; left: -5px; border-width: 2px 0 0 2px; }
    .wrapper::after  { bottom: -5px; right: -5px; border-width: 0 2px 2px 0; }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 2px 2px 0 0;
      padding: 20px 24px 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      gap: 16px;
      animation: fadeDown 0.6s ease both;
    }

    .logo-box {
      width: 50px; height: 50px;
      border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: rgba(177,79,255,0.08);
      box-shadow: 0 0 18px rgba(177,79,255,0.2), inset 0 0 12px rgba(177,79,255,0.07);
      flex-shrink: 0;
      position: relative;
    }
    .logo-box::before, .logo-box::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-color: var(--gold-light);
      border-style: solid;
      opacity: 0.5;
    }
    .logo-box::before { top: -2px; right: -2px; border-width: 1px 1px 0 0; }
    .logo-box::after  { bottom: -2px; left: -2px; border-width: 0 0 1px 1px; }

    .header-info h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--gold-light);
      text-shadow: 0 0 20px rgba(177,79,255,0.5);
      text-transform: uppercase;
    }

    .header-info p {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      margin-top: 4px;
      text-transform: uppercase;
    }

    .online {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      margin-right: 7px;
      box-shadow: 0 0 6px var(--gold);
      animation: pulse 2.5s infinite;
      vertical-align: middle;
    }

    /* gold divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
      opacity: 0.5;
    }

    /* ── CHAT WINDOW ── */
    .chat-window {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      height: 400px;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .chat-window::-webkit-scrollbar { width: 3px; }
    .chat-window::-webkit-scrollbar-thumb {
      background: var(--gold-dim);
      box-shadow: 0 0 4px var(--gold);
    }

    .bubble-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: bubbleIn 0.3s ease both;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      background: rgba(177,79,255,0.07);
      text-transform: uppercase;
    }

    .bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: 78%; }

    .bubble-label {
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    .bubble-label.user { text-align: right; }

    .bubble {
      padding: 12px 16px;
      font-size: 0.83rem;
      line-height: 1.65;
      word-break: break-word;
      font-weight: 300;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .bubble.bot {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-left: 2px solid var(--gold-dim);
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(177,79,255,0.35);
      border-right: 2px solid var(--gold);
      box-shadow: 0 0 20px rgba(177,79,255,0.08);
    }

    .bubble.system {
      background: transparent;
      border: none;
      border-top: 1px solid rgba(177,79,255,0.15);
      border-bottom: 1px solid rgba(177,79,255,0.15);
      color: var(--muted);
      font-size: 0.62rem;
      max-width: 100%;
      text-align: center;
      align-self: center;
      padding: 5px 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      width: 100%;
    }

    /* ── LEARN BOX ── */
    .learn-box {
      background: rgba(10,8,0,0.05);
      border: 1px solid rgba(177,79,255,0.4);
      border-top: 1px solid var(--gold);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: 14px 18px;
      display: none;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
    }
    .learn-box.visible { display: flex; }

    .learn-box label {
      font-size: 0.6rem;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .learn-row { display: flex; gap: 8px; }

    .learn-box input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(177,79,255,0.15);
      border-bottom: 1px solid var(--gold-dim);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.83rem;
      font-weight: 300;
      padding: 9px 13px;
      outline: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .learn-box input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(177,79,255,0.15);
    }

    .learn-box button {
      background: rgba(177,79,255,0.1);
      color: var(--gold-light);
      border: 1px solid var(--gold-dim);
      padding: 9px 16px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.68rem;
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .learn-box button:hover {
      background: rgba(177,79,255,0.18);
      box-shadow: 0 0 14px rgba(177,79,255,0.25);
    }

    /* ── INPUT AREA ── */
    .input-area {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 2px 2px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .input-row { display: flex; gap: 10px; }

    #userInput {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(177,79,255,0.15);
      border-bottom: 1px solid var(--gold-dim);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 12px 16px;
      outline: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #userInput:focus {
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(177,79,255,0.15);
    }
    #userInput::placeholder { color: var(--muted); letter-spacing: 0.05em; }

    #sendBtn {
      background: rgba(201,168,76,0.12);
      color: var(--gold-light);
      border: 1px solid var(--gold-dim);
      padding: 12px 22px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(177,79,255,0.1);
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    #sendBtn:hover {
      background: rgba(177,79,255,0.22);
      box-shadow: 0 0 22px rgba(177,79,255,0.3);
      transform: translateY(-1px);
    }
    #sendBtn:active { transform: translateY(0); }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer p {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .footer .val { color: var(--gold); }
    .hint b { color: var(--gold-light); font-weight: 600; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--gold); }
      50% { opacity: 0.4; box-shadow: none; }
    }
  </style>
</head>
<body>

  }

  function sendMessage() {
    const zprava = userInput.value.trim().toLowerCase();
    if (!zprava) return;
    addBubble(userInput.value.trim(), 'user');
    userInput.value = '';
    if (zprava === 'konec') {
      setTimeout(() => {
        addBubble('Na shledanou. Bylo mi potěšením.', 'bot');
        addBubble('✦  Relace ukončena  ✦', 'system');
        userInput.disabled = true;
        document.getElementById('sendBtn').disabled = true;
        userInput.placeholder = 'Relace byla ukončena.';
      }, 300);
      return;
    }
    setTimeout(() => {
      if (zprava in odpovedi) {
        addBubble(odpovedi[zprava], 'bot');
      } else {
        cekajiciZprava = zprava;
        addBubble('Tuto frázi neznám. Jak mám příště odpovědět?', 'bot');
        learnBox.classList.add('visible');
        learnInput.focus();
      }
    }, 350);
  }

  function submitLearn() {
    const nova = learnInput.value.trim();
    if (!nova || !cekajiciZprava) return;
    odpovedi[cekajiciZprava] = nova;
    updateMemCount();
    learnBox.classList.remove('visible');
    learnInput.value = '';
    addBubble('Děkuji. Zapamatoval jsem si to. ✦', 'bot');
    cekajiciZprava = null;
    userInput.focus();
  }

  userInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
  learnInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitLearn(); });

  updateMemCount();
</script>
